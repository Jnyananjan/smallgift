<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Scanner</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://rawgit.com/jeromeetienne/ar.js/1.7.2/aframe/build/aframe-ar.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: manipulation; /* Prevent pinch zoom */
        }
    </style>
</head>
<body>
    <a-scene embedded arjs>
        <a-marker preset="custom" type="pattern" url="marker.patt">
            <a-entity 
                geometry="primitive: box; depth: 0.1; height: 0.5; width: 0.5"
                material="color: red"
                scale="0.3 0.3 0.3"
                position="0 0 0">
            </a-entity>
        </a-marker>
        <a-entity camera="fov: 80" position="0 0 5"></a-entity>
    </a-scene>
</body>
</html>
